# Cloud Build configuration for UNKNOWN Brain
# Builds and deploys to Cloud Run automatically

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/unknown-brain/unknown-brain:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/unknown-brain/unknown-brain:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/unknown-brain/unknown-brain:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/unknown-brain/unknown-brain:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/unknown-brain/unknown-brain:$BUILD_ID'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'  # Remove this for production security
      - '--timeout=3600'  # 60 minutes for LLM processing
      - '--memory=2Gi'
      - '--cpu=2'
      - '--max-instances=10'
      - '--min-instances=0'  # Scale to zero when not in use
      - '--concurrency=10'
      - '--port=8080'
      - '--no-cpu-throttling'  # Required: scoring runs in FastAPI BackgroundTasks after response returns
      # --update-env-vars (not --set-env-vars): adds/updates only these keys and
      # leaves any other out-of-band env vars untouched. (OPENAI_API_KEY is a
      # Secret Manager mount, so it's unaffected by either flag either way.)
      # ARTICLE9_MODE=redact strips Article 9 special-category
      # data from talent meetings before storage (approved by UNKNOWN 15 Jun 2026);
      # un-cleanable meetings fail closed + are dropped/logged, never stored
      # (ARTICLE9_REDACT_ON_FAILURE defaults to 'drop').
      - '--update-env-vars=ENVIRONMENT=production,ARTICLE9_MODE=redact'
      # Note: OPENAI_API_KEY should be set separately via gcloud or Cloud Console

# Store images in Artifact Registry
options:
  logging: CLOUD_LOGGING_ONLY

# Build timeout (default is 10 minutes, extend if needed)
timeout: '1200s'

# Tags for tracking builds
tags:
  - 'unknown-brain'
  - 'transcript-scoring'

# Substitutions (can be overridden at build time)
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'unknown-brain'